<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.9375rem;
      background: #fff;
      color: #1a202c;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="number"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .field { margin-bottom: 1rem; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      margin-top: 0.5rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      text-align: center;
    }

    .result-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: #15803d;
    }

    .result-label {
      font-size: 0.875rem;
      color: #4a5568;
      margin-top: 0.25rem;
    }

    .error {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 6px;
      color: #c53030;
      font-size: 0.875rem;
    }

    .hidden { display: none; }

    .swap-btn {
      background: none;
      border: 1px solid #cbd5e0;
      color: #4a5568;
      font-size: 1.1rem;
      padding: 0.45rem;
      margin-top: 0;
      border-radius: 6px;
      width: auto;
      align-self: flex-end;
    }

    .swap-btn:hover { background: #edf2f7; }

    .unit-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .unit-row > .field { flex: 1; margin-bottom: 0; }

    .api-link {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: #718096;
    }

    .api-link a { color: #4f46e5; text-decoration: none; }
    .api-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Unit Converter</h1>
    <p class="subtitle">Convert values across length, temperature, weight, and more.</p>

    <div class="field">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Loading…</option>
      </select>
    </div>

    <div class="field">
      <label for="value">Value</label>
      <input type="number" id="value" placeholder="Enter a number" step="any" />
    </div>

    <div class="unit-row">
      <div class="field">
        <label for="from">From</label>
        <select id="from"><option value="">—</option></select>
      </div>
      <button class="swap-btn" id="swap" title="Swap units">⇄</button>
      <div class="field">
        <label for="to">To</label>
        <select id="to"><option value="">—</option></select>
      </div>
    </div>

    <button id="convertBtn" disabled>Convert</button>

    <div id="result" class="result hidden">
      <div class="result-value" id="resultValue"></div>
      <div class="result-label" id="resultLabel"></div>
    </div>

    <div id="error" class="error hidden"></div>

    <p class="api-link">
      API docs available at <a href="/swagger" target="_blank">/swagger</a>
    </p>
  </div>

  <script>
    const categoryEl  = document.getElementById('category');
    const fromEl      = document.getElementById('from');
    const toEl        = document.getElementById('to');
    const valueEl     = document.getElementById('value');
    const convertBtn  = document.getElementById('convertBtn');
    const resultEl    = document.getElementById('result');
    const resultValue = document.getElementById('resultValue');
    const resultLabel = document.getElementById('resultLabel');
    const errorEl     = document.getElementById('error');
    const swapBtn     = document.getElementById('swap');

    let allUnits = {};

    async function loadUnits() {
      try {
        const res = await fetch('/api/units');
        const data = await res.json();

        categoryEl.innerHTML = '<option value="">Select a category</option>';
        data.forEach(cat => {
          allUnits[cat.category] = cat.units;
          const opt = document.createElement('option');
          opt.value = cat.category;
          opt.textContent = cat.category.charAt(0).toUpperCase() + cat.category.slice(1);
          categoryEl.appendChild(opt);
        });
      } catch {
        showError('Failed to load units. Make sure the API is running.');
      }
    }

    function populateUnitSelects(category) {
      const units = allUnits[category] || [];
      [fromEl, toEl].forEach(sel => {
        sel.innerHTML = '<option value="">Select unit</option>';
        units.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = `${u.name} (${u.symbol})`;
          sel.appendChild(opt);
        });
      });
      if (units.length >= 2) {
        fromEl.value = units[0].id;
        toEl.value   = units[1].id;
      }
      updateConvertButton();
    }

    function updateConvertButton() {
      const ready = categoryEl.value && fromEl.value && toEl.value && valueEl.value !== '';
      convertBtn.disabled = !ready;
    }

    async function doConvert() {
      hideMessages();
      const value = valueEl.value;
      const from  = fromEl.value;
      const to    = toEl.value;

      try {
        const res = await fetch(`/api/convert?value=${encodeURIComponent(value)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Conversion failed.');
          return;
        }

        const formatted = Number.isInteger(data.outputValue)
          ? data.outputValue.toLocaleString()
          : parseFloat(data.outputValue.toPrecision(10)).toLocaleString(undefined, { maximumFractionDigits: 8 });

        resultValue.textContent = `${formatted} ${data.outputUnitSymbol}`;
        resultLabel.textContent = `${data.inputValue} ${data.inputUnitSymbol} = ${formatted} ${data.outputUnitSymbol}`;
        resultEl.classList.remove('hidden');
      } catch {
        showError('Network error. Please check your connection.');
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
      resultEl.classList.add('hidden');
    }

    function hideMessages() {
      errorEl.classList.add('hidden');
      resultEl.classList.add('hidden');
    }

    categoryEl.addEventListener('change', () => {
      hideMessages();
      populateUnitSelects(categoryEl.value);
    });

    [fromEl, toEl, valueEl].forEach(el =>
      el.addEventListener('input', () => { hideMessages(); updateConvertButton(); })
    );

    swapBtn.addEventListener('click', () => {
      const tmp = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = tmp;
      hideMessages();
      updateConvertButton();
    });

    convertBtn.addEventListener('click', doConvert);

    valueEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !convertBtn.disabled) doConvert();
    });

    loadUnits();
  </script>
</body>
</html>
